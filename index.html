<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift Moto | Clean, Minimalist Performance</title>
    <style>
        /* --- Reset & Core Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid #1c1c1e;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 400;
            color: #a1a1a6;
            margin-left: 25px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* --- Hero Section --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-top: 60px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            color: #86868b;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Apple-esque Rounded Button */
        .btn-shop {
            background-color: #ffffff;
            color: #000000;
            padding: 12px 35px;
            font-size: 0.95rem;
            font-weight: 500;
            border-none: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .btn-shop:hover {
            background-color: #f5f5f7;
            transform: scale(1.02);
        }

        /* --- Shop Section (Shopify Grid Style) --- */
        .shop-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #0a0a0c;
            border: 1px solid #1c1c1e;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .product-card:hover {
            border-color: #333336;
        }

        /* Placeholder for Product Images */
        .product-image-placeholder {
            width: 100%;
            height: 300px;
            background-color: #1c1c1e;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #424245;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #f5f5f7;
        }

        .product-price {
            font-size: 1rem;
            color: #86868b;
            font-weight: 400;
        }

        /* Stripe Checkout Button */
        .stripe-checkout-btn {
            display: block;
            text-align: center;
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            width: 100%;
            margin-top: auto; /* Pushes button to bottom of card if text lengths vary */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .stripe-checkout-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Footer --- */
        footer {
            border-top: 1px solid #1c1c1e;
            padding: 40px 20px;
            text-align: center;
            color: #424245;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">Rift Moto</div>
            <nav class="nav-links">
                <a href="#shop">Shop</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h1>Rift Moto</h1>
        <p>Precision built. Minimal design.</p>
        <a href="#shop" class="btn-shop">Shop Now</a>
    </section>

    <section class="shop-section" id="shop">
        <h2 class="section-title">Featured Products</h2>
        
        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image-placeholder">Product Image</div>
                <div class="product-info">
                    <h3 class="product-name">Core Moto Jacket</h3>
                    <span class="product-price">$299.00</span>
                </div>
                <a href="YOUR_STRIPE_PAYMENT_LINK_HERE" class="stripe-checkout-btn">Buy Now</a>
            </div>

            <div class="product-card">
                <div class="product-image-placeholder">Product Image</div>
                <div class="product-info">
                    <h3 class="product-name">Rift Stealth Helmet</h3>
                    <span class="product-price">$450.00</span>
                </div>
                <a href="YOUR_STRIPE_PAYMENT_LINK_HERE" class="stripe-checkout-btn">Buy Now</a>
            </div>

            <div class="product-card">
                <div class="product-image-placeholder">Product Image</div>
                <div class="product-info">
                    <h3 class="product-name">Apex Gloves</h3>
                    <span class="product-price">$85.00</span>
                </div>
                <a href="YOUR_STRIPE_PAYMENT_LINK_HERE" class="stripe-checkout-btn">Buy Now</a>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rift Moto. All rights reserved.</p>
    </footer>

</body>
</html>
